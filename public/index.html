<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Gestión de Managers — Quantica360</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0E7C86">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --teal:#0E7C86;
    --teal-dark:#0A5E66;
    --teal-light:#E6F3F4;
    --ink:#12232B;
    --muted:#6B7C82;
    --line:#DCE6E8;
    --bg:#F5F8F8;
    --card:#FFFFFF;
    --danger:#C4472B;
    --warn:#B8860B;
    --radius:14px;
    --st-activo:#2E6FC4;
    --st-pendiente:#8A8F98;
    --st-reprogramado:#7B4FC9;
    --st-novendio:#C4472B;
    --st-vendidopend:#D98B1F;
    --st-pagado:#1E8A5A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;}
  body{padding-bottom:60px;}
  .app{max-width:720px;margin:0 auto;padding:14px 12px 40px;}
  header.top{position:sticky;top:0;z-index:20;background:var(--teal);color:#fff;
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 2px 8px rgba(0,0,0,.12);}
  header.top .brand{display:flex;flex-direction:column;line-height:1.2;}
  header.top .brand b{font-size:16px;letter-spacing:.2px;}
  header.top .brand span{font-size:11.5px;opacity:.85;}
  .iconbtn{background:rgba(255,255,255,.18);border:none;color:#fff;border-radius:10px;
    padding:8px 10px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .iconbtn:active{background:rgba(255,255,255,.32);}
  .savebadge{position:fixed;top:64px;left:50%;transform:translateX(-50%);
    background:#1E8A5A;color:#fff;padding:7px 16px;border-radius:20px;font-size:13px;
    font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.18);z-index:60;opacity:0;
    transition:opacity .25s, transform .25s;pointer-events:none;}
  .savebadge.show{opacity:1;transform:translateX(-50%) translateY(4px);}
  .savebadge.err{background:var(--danger);}

  /* Login/lock screen */
  .lockwrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:24px;text-align:center;}
  .lockwrap h1{font-size:20px;margin:0 0 4px;}
  .lockwrap p{color:var(--muted);font-size:13.5px;margin:0 0 24px;}
  .namegrid{display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px;}
  .namebtn{background:var(--card);border:1.5px solid var(--line);border-radius:12px;
    padding:13px 16px;font-size:15px;text-align:left;cursor:pointer;color:var(--ink);}
  .namebtn:active{background:var(--teal-light);border-color:var(--teal);}
  .namebtn.admin{border-color:var(--teal);background:var(--teal-light);font-weight:700;}

  /* Manager cards */
  .mgrcard{background:var(--card);border-radius:var(--radius);margin-bottom:12px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden;border:1px solid var(--line);}
  .mgrhead{display:flex;align-items:center;gap:10px;padding:14px 14px;cursor:pointer;}
  .mgrhead .donut{width:40px;height:40px;border-radius:50%;flex:none;}
  .mgrhead .info{flex:1;min-width:0;}
  .mgrhead .info b{font-size:15px;display:block;}
  .mgrhead .info span{font-size:12px;color:var(--muted);}
  .chev{transition:transform .2s;color:var(--muted);font-size:14px;}
  .mgrcard.open .chev{transform:rotate(180deg);}
  .mgrbody{display:none;padding:0 14px 14px;}
  .mgrcard.open .mgrbody{display:block;}
  .statsline{display:flex;flex-wrap:wrap;gap:6px;padding:0 0 12px;}
  .statchip{font-size:10.5px;padding:3px 8px;border-radius:20px;color:#fff;font-weight:600;}

  .clientlist{display:flex;flex-direction:column;gap:10px;}
  .clientcard{border:1px solid var(--line);border-radius:12px;padding:12px;background:#FCFDFD;}
  .clientcard .cname{font-size:14.5px;font-weight:700;margin-bottom:2px;}
  .clientcard .cmeta{font-size:12.5px;color:var(--muted);line-height:1.5;}
  .clientcard .cmeta a{color:var(--teal-dark);text-decoration:none;}
  .revisarflag{display:inline-block;margin-top:6px;font-size:11px;background:#FCEFD8;
    color:var(--warn);padding:2px 8px;border-radius:20px;font-weight:600;}
  .statusrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
  .statuspill{font-size:11px;padding:5px 9px;border-radius:20px;border:1.5px solid var(--line);
    background:#fff;color:var(--muted);cursor:pointer;font-weight:600;}
  .statuspill.active{color:#fff;border-color:transparent;}
  .paydatebtn{font-size:11px;padding:5px 9px;border-radius:20px;border:1.5px dashed var(--teal);
    background:#fff;color:var(--teal-dark);cursor:pointer;font-weight:600;margin-top:6px;}
  .paydateset{font-size:11px;padding:5px 9px;border-radius:20px;background:var(--teal-light);
    color:var(--teal-dark);font-weight:600;margin-top:6px;display:inline-flex;align-items:center;gap:6px;}
  .paydateset button{border:none;background:none;color:var(--teal-dark);cursor:pointer;font-size:12px;padding:0;}
  .cactions{display:flex;gap:8px;margin-top:10px;}
  .miniBtn{font-size:11.5px;padding:5px 10px;border-radius:8px;border:1px solid var(--line);
    background:#fff;color:var(--muted);cursor:pointer;}

  .cardbtns{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
  .actionbtn{flex:1;min-width:140px;font-size:12.5px;font-weight:600;padding:9px 10px;
    border-radius:10px;border:1.5px solid var(--teal);background:#fff;color:var(--teal-dark);cursor:pointer;}
  .actionbtn.primary{background:var(--teal);color:#fff;}
  .actionbtn:active{opacity:.8;}

  .emptynote{font-size:12.5px;color:var(--muted);padding:10px 2px;}

  /* Admin toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .toolbtn{flex:1;min-width:130px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:11px;font-size:12.5px;font-weight:600;color:var(--ink);
    cursor:pointer;text-align:center;}
  .toolbtn:active{background:var(--teal-light);}

  .summarybox{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:14px;}
  .summarybox h3{margin:0 0 10px;font-size:14px;}
  .sumrow{display:flex;align-items:center;gap:8px;font-size:12.5px;margin-bottom:6px;}
  .sumrow .bar{flex:1;height:8px;background:var(--line);border-radius:6px;overflow:hidden;}
  .sumrow .bar i{display:block;height:100%;}
  .sumrow .lbl{width:150px;flex:none;color:var(--muted);}
  .sumrow .val{width:56px;flex:none;text-align:right;font-weight:700;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(10,20,25,.5);z-index:100;
    display:flex;align-items:flex-end;justify-content:center;}
  .modal{background:#fff;width:100%;max-width:520px;border-radius:18px 18px 0 0;
    padding:18px 16px 24px;max-height:88vh;overflow-y:auto;}
  @media(min-width:560px){.overlay{align-items:center;}.modal{border-radius:18px;}}
  .modal h3{margin:0 0 12px;font-size:16px;}
  .modal label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;font-weight:600;}
  .modal input[type=text],.modal input[type=tel],.modal input[type=date],
  .modal textarea,.modal select{
    width:100%;padding:10px 11px;border:1.5px solid var(--line);border-radius:10px;
    font-size:14px;font-family:inherit;background:#fff;color:var(--ink);}
  .modal textarea{min-height:110px;resize:vertical;}
  .modalbtns{display:flex;gap:8px;margin-top:18px;}
  .modalbtns button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:700;
    border:none;cursor:pointer;}
  .btncancel{background:#F0F2F3;color:var(--ink);}
  .btnok{background:var(--teal);color:#fff;}
  .btndanger{background:var(--danger);color:#fff;}
  .closeX{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;
    color:var(--muted);cursor:pointer;}
  .modalhead{position:relative;}
  .helptext{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5;}
  .dupewarn{background:#FCEFD8;border-radius:10px;padding:10px;font-size:12.5px;color:var(--warn);margin-top:10px;}
  .backuprow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;
    border-bottom:1px solid var(--line);font-size:13px;}
  .backuprow:last-child{border-bottom:none;}
  .backuprow button{font-size:11.5px;padding:5px 10px;border-radius:8px;border:1px solid var(--teal);
    background:#fff;color:var(--teal-dark);cursor:pointer;}
  .installsteps{font-size:13px;line-height:1.7;text-align:left;}
  .installsteps b{color:var(--teal-dark);}
  .loadingdots{display:inline-block;}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--teal-light);
    border-top-color:var(--teal);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;}
  @keyframes sp{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>
<div id="savebadge" class="savebadge">Guardado ✓</div>
<script src="/app-web.js"></script>
</body>
</html>
